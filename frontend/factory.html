<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Factory Camera - Thermal Alert</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f1923; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 500px; margin: 0 auto; padding: 16px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .header h1 { font-size: 18px; color: #ff6b35; }
    .header .factory-name { font-size: 13px; color: #8899aa; }
    .camera-box {
      position: relative; background: #1a2a3a; border-radius: 10px; overflow: hidden;
      aspect-ratio: 4/3; margin-bottom: 16px;
    }
    .camera-box video, .camera-box canvas { width: 100%; height: 100%; object-fit: cover; }
    .camera-box .overlay {
      position: absolute; bottom: 8px; left: 8px; right: 8px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .camera-box .status {
      font-size: 11px; padding: 3px 8px; border-radius: 4px; background: #0f1923;
    }
    .status.live { color: #4ade80; }
    .status.off { color: #ff4444; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; font-weight: 600;
    }
    .btn-start { background: #4ade80; color: #000; }
    .btn-stop { background: #ff4444; color: #fff; }
    .btn-toggle { background: #2a3a4a; color: #e0e0e0; }
    .btn-toggle.active { background: #ff6b35; color: #fff; }
    .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .stats { font-size: 12px; color: #8899aa; margin-bottom: 16px; }
    .sensor-panel {
      background: #1a2a3a; border-radius: 10px; padding: 14px; margin-bottom: 16px;
    }
    .sensor-panel h3 { font-size: 14px; margin-bottom: 10px; color: #fbbf24; }
    .sensor-row {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .sensor-row .label { font-size: 12px; width: 90px; color: #8899aa; }
    .sensor-row .value { font-size: 16px; font-weight: 700; width: 60px; text-align: right; }
    .sensor-row input[type="range"] { flex: 1; height: 3px; -webkit-appearance: none; background: #2a3a4a; border-radius: 2px; outline: none; }
    .sensor-row input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #ff6b35; cursor: pointer; }
    .alert-bar { padding: 8px 12px; border-radius: 6px; font-size: 12px; margin-bottom: 16px; display: none; }
    .alert-bar.critical { display: block; background: #4a1a1a; color: #ff4444; border: 1px solid #ff4444; }
    .meta-info { font-size: 11px; color: #555; text-align: center; margin-top: 24px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div>
        <h1>Camera Feed</h1>
        <div class="factory-name" id="factory-name">Loading...</div>
      </div>
      <div>
        <span id="ws-status" style="font-size:11px;color:#ff4444;margin-right:8px;">WS: --</span>
        <span id="fps-counter" style="font-size:12px;color:#8899aa;">0 fps</span>
      </div>
    </div>

    <div class="camera-box">
      <video id="video" autoplay playsinline muted style="display:none;"></video>
      <canvas id="preview"></canvas>
      <div class="overlay">
        <span id="cam-status" class="status off">OFF</span>
        <div>
          <button id="btn-cam" class="btn btn-start" onclick="toggleCamera()">Start Camera</button>
        </div>
      </div>
    </div>

    <div id="alert-bar" class="alert-bar"></div>

    <div class="sensor-panel">
      <h3>Sensor Values (drag to trigger alerts)</h3>
      <div class="sensor-row">
        <span class="label">Temperature</span>
        <span class="value" id="temp-val">32.0 C</span>
        <input type="range" min="20" max="120" value="32" id="temp-slider" oninput="updateSensor('temperature', this.value)">
      </div>
      <div class="sensor-row">
        <span class="label">Humidity</span>
        <span class="value" id="hum-val">50.0 %</span>
        <input type="range" min="0" max="100" value="50" id="hum-slider" oninput="updateSensor('humidity', this.value)">
      </div>
      <div class="sensor-row">
        <span class="label">Smoke Level</span>
        <span class="value" id="smoke-val">10.0 %</span>
        <input type="range" min="0" max="100" value="10" id="smoke-slider" oninput="updateSensor('smoke_level', this.value)">
      </div>
      <div class="sensor-row">
        <span class="label">Pressure</span>
        <span class="value" id="press-val">1.02 atm</span>
        <input type="range" min="0.8" max="2.0" step="0.01" value="1.02" id="press-slider" oninput="updateSensor('pressure', this.value)">
      </div>
    </div>

    <div class="meta-info">
      Thermal Alert System - Sivakasi
    </div>
  </div>

  <script src="/config.js"></script>
  <script>
    let factoryId = null;
    let factoryName = '';
    let ws = null;
    let streaming = false;
    let stream = null;
    let token = null;
    let fps = 0;
    let frameCount = 0;
    let lastFpsTime = 0;

    function jwtPayload(token) {
      try {
        const b64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
        return JSON.parse(atob(b64));
      } catch (e) { return null; }
    }

    const FACTORIES = [
      { id: 1, name: 'Sri Kaliswari Fireworks' },
      { id: 2, name: 'Standard Fireworks' },
      { id: 3, name: 'Ayyan Fireworks' },
      { id: 4, name: 'Raja Fireworks' },
      { id: 5, name: 'Sakthi Fireworks' },
      { id: 6, name: 'Muthu Fireworks' },
      { id: 7, name: 'Pandian Fireworks' },
      { id: 8, name: 'Sivakasi Fireworks Industries' },
    ];

    async function init() {
      const stored = localStorage.getItem('token');
      if (stored) {
        token = stored;
        const payload = jwtPayload(token);
        if (payload && payload.role === 'factory') {
          factoryId = payload.factory_id;
          const f = FACTORIES.find(x => x.id === factoryId);
          factoryName = f ? f.name : 'Factory ' + factoryId;
          document.getElementById('factory-name').textContent = factoryName;
          return;
        }
      }

      const params = new URLSearchParams(window.location.search);
      const t = params.get('token');
      if (t) {
        const payload = jwtPayload(t);
        if (payload && payload.factory_id) {
          token = t;
          localStorage.setItem('token', token);
          factoryId = payload.factory_id;
          const f = FACTORIES.find(x => x.id === factoryId);
          factoryName = f ? f.name : 'Factory ' + factoryId;
          document.getElementById('factory-name').textContent = factoryName;
          return;
        }
      }

      document.getElementById('factory-name').textContent = 'Login required';
      document.getElementById('btn-cam').disabled = true;
      document.getElementById('btn-cam').textContent = 'Login via Dashboard';
      document.getElementById('cam-status').textContent = 'LOGIN';
    }

    async function toggleCamera() {
      if (streaming) {
        stopCamera();
      } else {
        startCamera();
      }
    }

    async function startCamera() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 }, frameRate: { ideal: 24 } }
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();

        connectWebSocket();
        streaming = true;
        document.getElementById('btn-cam').textContent = 'Stop Camera';
        document.getElementById('btn-cam').className = 'btn btn-stop';
        document.getElementById('cam-status').textContent = 'LIVE';
        document.getElementById('cam-status').className = 'status live';
        lastFpsTime = performance.now();
        frameCount = 0;

        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');
        canvas.width = 640;
        canvas.height = 480;

        function sendFrame() {
          if (!streaming) return;
          ctx.drawImage(video, 0, 0, 640, 480);
          canvas.toBlob(function(blob) {
            if (blob) {
              var useWs = ws && ws.readyState === WebSocket.OPEN;
              if (useWs) {
                ws.send(blob);
              } else {
                sendFrameHttp(blob);
              }
              frameCount++;
              var now = performance.now();
              if (now - lastFpsTime >= 1000) {
                fps = frameCount;
                document.getElementById('fps-counter').textContent = fps + ' fps';
                frameCount = 0;
                lastFpsTime = now;
              }
            }
            requestAnimationFrame(sendFrame);
          }, 'image/jpeg', 0.5);
        }
        sendFrame();
      } catch (e) {
        document.getElementById('cam-status').textContent = 'Camera error: ' + e.message;
        document.getElementById('cam-status').className = 'status off';
      }
    }

    function stopCamera() {
      streaming = false;
      if (ws) { ws.close(); ws = null; }
      if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
      document.getElementById('btn-cam').textContent = 'Start Camera';
      document.getElementById('btn-cam').className = 'btn btn-start';
      document.getElementById('cam-status').textContent = 'OFF';
      document.getElementById('cam-status').className = 'status off';
      document.getElementById('fps-counter').textContent = '0 fps';
    }

    function setWsStatus(state) {
      const el = document.getElementById('ws-status');
      if (state === 'connected') { el.textContent = 'WS: OK'; el.style.color = '#4ade80'; }
      else if (state === 'connecting') { el.textContent = 'WS: ...'; el.style.color = '#fbbf24'; }
      else { el.textContent = 'WS: --'; el.style.color = '#ff4444'; }
    }

    function sendFrameHttp(blob) {
      const url = 'https://thermal-alert-backend.onrender.com/api/camera/upload/' + factoryId + '?token=' + token;
      fetch(url, { method: 'POST', body: blob }).catch(function(){});
    }

    function connectWebSocket() {
      if (ws) ws.close();
      setWsStatus('connecting');
      ws = new WebSocket('wss://thermal-alert-backend.onrender.com/api/camera/stream/' + factoryId + '?token=' + token);
      ws.onopen = function() { setWsStatus('connected'); };
      ws.onclose = function() { setWsStatus('disconnected'); if (streaming) setTimeout(connectWebSocket, 5000); };
      ws.onerror = function() { setWsStatus('disconnected'); };
    }

    async function updateSensor(sensor, value) {
      const fVal = parseFloat(value);
      const labels = {
        temperature: { el: 'temp-val', unit: ' C' },
        humidity: { el: 'hum-val', unit: ' %' },
        smoke_level: { el: 'smoke-val', unit: ' %' },
        pressure: { el: 'press-val', unit: ' atm' },
      };
      const info = labels[sensor];
      if (info) {
        document.getElementById(info.el).textContent = fVal.toFixed(info.unit === ' atm' ? 2 : 1) + info.unit;
      }

      if (sensor === 'temperature') {
        document.getElementById(info.el).style.color = fVal >= 70 ? '#ff4444' : fVal >= 45 ? '#fbbf24' : '#4ade80';
      }
      if (sensor === 'smoke_level') {
        document.getElementById(info.el).style.color = fVal >= 80 ? '#ff4444' : fVal >= 50 ? '#fbbf24' : '#4ade80';
      }

      try {
        const body = {};
        body[sensor] = fVal;
        const resp = await fetch((API_BASE_URL || window.location.origin) + '/api/simulation/update/' + factoryId, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await resp.json();
        if (data.status === 'critical') {
          const bar = document.getElementById('alert-bar');
          bar.textContent = 'ALERT: ' + sensor.replace('_', ' ') + ' is at critical level (' + fVal + ')!';
          bar.className = 'alert-bar critical';
        } else {
          document.getElementById('alert-bar').className = 'alert-bar';
        }
      } catch (e) {}
    }

    init();
  </script>
</body>
</html>
